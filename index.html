<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #152618;
      --olive: #798C4F;
      --gold: #D9B504;
      --sand: #D9CA9C;
      --bone: #D9D0C7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Archivo Black', sans-serif;
      background: var(--dark);
      color: var(--bone);
      overflow-x: hidden;
    }

    section {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      position: relative;
    }

    /* COVER */
    .cover {
      background: var(--dark);
      color: var(--sand);
    }

    .cover h1 {
      font-size: clamp(4rem, 18vw, 22rem);
      line-height: 0.85;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      text-align: center;
      word-break: break-word;
    }

    .cover .tagline {
      font-size: clamp(0.9rem, 2vw, 1.6rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--olive);
      margin-top: 1.5rem;
      text-align: center;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--olive);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(8px);
      }
    }

    /* LINKS */
    .links {
      background: var(--olive);
      color: var(--dark);
      flex-direction: column;
      gap: 4rem;
    }

    /* SOCIALS */
    .socials {
      background: var(--gold);
      color: var(--dark);
      flex-direction: column;
      gap: 4rem;
    }

    .section-label {
      font-size: clamp(3rem, 12vw, 14rem);
      line-height: 0.85;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      text-align: center;
    }

    .icon-row {
      display: flex;
      gap: clamp(1.5rem, 5vw, 4rem);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .icon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: clamp(70px, 12vw, 110px);
      height: clamp(70px, 12vw, 110px);
      background: var(--dark);
      border-radius: 50%;
      transition: transform 0.3s ease, background 0.3s ease;
      color: var(--sand);
    }

    .icon-link:hover {
      transform: translateY(-6px) scale(1.05);
      background: var(--bone);
      color: var(--dark);
    }

    .icon-link svg {
      width: 45%;
      height: 45%;
    }

    /* FOOTER */
    footer {
      background: var(--dark);
      color: var(--olive);
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .icon-row {
        gap: 1.25rem;
      }
    }
  </style>
</head>
